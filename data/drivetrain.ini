[HEADER]
VERSION=3

[TRACTION]
TYPE=RWD				; Wheel drive. Possible options: FWD (Front Wheel Drive), RWD (Rear Wheel Drive)

[GEARS]
COUNT=4					; forward gears number
GEAR_R=-2.475			; rear gear ratio
; forward gears ratios. must be equal to number of gears defined on count
GEAR_1=2.04				;0.49					
GEAR_2=1.565			;0.639
GEAR_3=1.25				;0.8				
GEAR_4=1.00

FINAL=3.67				; final gear ratio  (12/54, 11/46, 12/50, 12/47, 12/44, 14/42)	

[DIFFERENTIAL]
POWER=0.03			; differential lock under power. 1.0=100% lock - 0 0% lock
COAST=0.03			; differential lock under coasting. 1.0=100% lock 0=0% lock
PRELOAD=2			; preload torque setting

[GEARBOX]
CHANGE_UP_TIME=300			; change up time in milliseconds
CHANGE_DN_TIME=300			; change down time in milliseconds
AUTO_CUTOFF_TIME=300		; Auto cutoff time for upshifts in milliseconds, 0 to disable
SUPPORTS_SHIFTER=1			; 1=Car supports shifter, 0=car supports only paddles
VALID_SHIFT_RPM_WINDOW=800			;range window additional to the precise rev matching rpm that permits gear engage.
CONTROLS_WINDOW_GAIN=0.4			;multiplayer for gas,brake,clutch pedals that permits gear engage on different rev matching rpm. the lower the more difficult.
INERTIA=0.027					; gearbox inertia. default values to 0.02 if not set
SCRIPTED_SHIFTING=0		; set to 1 for PSG gearbox

[CLUTCH]
MAX_TORQUE=400

[AUTOCLUTCH]
UPSHIFT_PROFILE=NONE			; Name of the autoclutch profile for upshifts. NONE to disable autoclutch on shift up
DOWNSHIFT_PROFILE=DOWNSHIFT_PROFILE	; Same as above for downshifts
USE_ON_CHANGES=0				; Use the autoclutch on gear shifts even when autoclutch is set to off. Needed for cars with semiautomatic gearboxes. values 1,0
MIN_RPM=800					; Minimum rpm for autoclutch engadgement
MAX_RPM=1100					; Maximum rpm for autoclutch engadgement
FORCED_ON=0

[DOWNSHIFT_PROFILE]
POINT_0=50				; Time to reach fully depress clutch
POINT_1=240				; Time to start releasing clutch
POINT_2=380				; Time to reach fully released clutch

[AUTOBLIP]
ELECTRONIC=0			; If =1 then it is a feature of the car and cannot be disabled
POINT_0=40				; Time to reach full level
POINT_1=240				; Time to start releasing gas
POINT_2=380			; Time to reach 0 gas
LEVEL=0.8				; Gas level to be reached

[DAMAGE]
RPM_WINDOW_K=100
TORQUE_THRESHOLD=265
TORQUE_DAMAGE_K=0.05
ENGINE_TORQUE_THRESHOLD=3550
ENGINE_TORQUE_DAMAGE_K=0.01
CLUTCH_TORQUE_THRESHOLD=265
CLUTCH_TORQUE_DAMAGE_K=0.01

[AUTO_SHIFTER]
UP=5900
DOWN=2600
SLIP_THRESHOLD=0.95
GAS_CUTOFF_TIME=0.380
