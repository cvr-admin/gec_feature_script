[WING_1]
SHOW_CLICKS=2					; 0 shows actual value. 1 Shows number of clicks needed depending step. 2 shows clicks starting from 0
TAB=GENERIC						; Tab to visualise. Keep consistent with default tabs otherwise ac will crash because of locales files errors
NAME=Screen Position			; Name of setup component
MIN=0							; Minimum permitted value
MAX=1							; Maximum permitted value
STEP=1							; Step
POS_X=0.5						; Position on X axis. 0 left, 0.5 middle, 1 right
POS_Y=7							; Position on Y axis. 0 to 8
HELP=							; Tool tip help to show on title mouseover

[WING_2]
SHOW_CLICKS=2					; 0 shows actual value. 1 Shows number of clicks needed depending step. 2 shows clicks starting from 0
TAB=GENERIC						; Tab to visualise. Keep consistent with default tabs otherwise ac will crash because of locales files errors
NAME=Canopy						; Name of setup component
MIN=0							; Minimum permitted value
MAX=1							; Maximum permitted value
STEP=1							; Step
POS_X=0.5						; Position on X axis. 0 left, 0.5 middle, 1 right
POS_Y=8							; Position on Y axis. 0 to 8
HELP=							; Tool tip help to show on title mouseover

