NAME=Rear Brake Blanking
MIN=0      ;minimum % of brake blanking
MAX=90    ;maximum % of brake blanking
STEP=30
POS_X=0.5
POS_Y=6
HELP="Define how much rear brake ducts are closed. It will also affect drag a bit. 0 = fully open, 3 = mostly closed."


/////////////////////////////////////////////////////
;GENERIC
/////////////////////////////////////////////////////

;the spare wheel setup function.
;the maximum amount of allowed wheels is set in the referenced LUT.
;feel free to edit the tab, description, LUT name(remember to rename the LUT too), DO NOT TOUCH THE ID; it is referenced in the LUA.
;if car has no spares, DO NOT REMOVE THIS!!!!! as the script still references it. just make the DEFAULT 0 and the LUT 0|0
[CUSTOM_SCRIPT_ITEM_0]
SHOW_CLICKS=0
ID=SPARE_WHEELS
TAB=GENERIC
NAME=Spare Wheels
LUT=sparewheels.lut
DEFAULT=2
POS_X=0.5
POS_Y=2
HELP="Number of spare wheels carried in the car, for on-track puncture repairs. Carrying extra wheels results in little added weight."

[CUSTOM_SCRIPT_ITEM_1]
SHOW_CLICKS=0
ID=VERBOSE_MECHANIC
TAB=GENERIC
NAME=Talking Mechanic
LUT=mechanic_setup.lut
DEFAULT=1
POS_X=0.5
POS_Y=3
HELP="This setting enables you to hear Jeff. No-one knows who Jeff is and some claim that he is just a side-effect from huffing leaded petrol fumes."

[CUSTOM_SCRIPT_ITEM_2]
SHOW_CLICKS=0
ID=OVERHEAD_MESSAGES
TAB=GENERIC
NAME=Overhead Messages
LUT=mechanic_setup.lut
DEFAULT=1
POS_X=0.5
POS_Y=4
HELP="Display engine events as overhead system messages. You may want to disable this as a VR user, but it is up to personal preference."

