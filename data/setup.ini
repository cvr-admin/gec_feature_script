/////////////////////////////////////////////////////
;PERFORMANCE
/////////////////////////////////////////////////////

[CUSTOM_SCRIPT_ITEM_3]
SHOW_CLICKS=0
ID=RADIATOR
TAB=PERFORMANCE
NAME=Radiator shielding
LUT=radiator.lut
DEFAULT=0
POS_X=0.5
POS_Y=1
HELP="Define how much radiator is open so you can limit its cooling efficiency. It will also affect drag and therefore top speed a bit. More closed is more hotter engine, but faster. Use to manage balance between speed and temperatures"

[ENGINE_MAPS]
SHOW_CLICKS=0
TAB=PERFORMANCE
NAME=Fuel mixture
LUT=engine_mixture.lut                                        ; format: name|index - can also use traditional system of indexing, just make sure your indexes don't go out of bounds of your MAP_ entries
POS_X=0.5
POS_Y=3
HELP="Default fuel mixture. Rich burns cooler than normal and saves some fuel while loses power. Lean runs hotter than normal, while has also less power on lower end, but saves fuel. Push gives you a little more power while stressing engine a lot, so use sparingly. Using other than normal also stresses engine more, so they increase the possibility of mechanical failures more or less. You can change maps on the fly using the 'Engine Map' control."

[CUSTOM_SCRIPT_ITEM_4]
SHOW_CLICKS=1
ID=BRAKE_DUCT_F
TAB=PERFORMANCE ;assigned setup tab
NAME=Front Brake Blanking
MIN=0      ;minimum % of brake blanking, higher means more blanking (less airflow)
MAX=90    ;maximum % of brake blanking
STEP=30
POS_X=0.5
POS_Y=5
HELP="Define how much front brake ducts are closed. It will also affect drag a bit. 0 = fully open, 3 = mostly closed."

[CUSTOM_SCRIPT_ITEM_5]
SHOW_CLICKS=1
ID=BRAKE_DUCT_R
