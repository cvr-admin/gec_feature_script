[HEADER]
VERSION=1
POWER_CURVE=power.lut			; power curve file
COAST_CURVE=FROM_COAST_REF 		; coast curve. can define 3 different options (coast reference, coast values for mathematical curve, coast curve file)

[ENGINE_DATA]
ALTITUDE_SENSITIVITY=0.1		; sensitivity to altitude
INERTIA=0.28					; engine inertia
LIMITER=6000					; engine rev limiter. 0 no limiter
LIMITER_HZ=800					; Frequency of engine limiter
MINIMUM=900					; Idle rpm
RESPONSE_TIME=0.14
MECHANICAL_EFFICIENCY=0.84                      ; %/100 - should match your "drivetrain losses" multiplier (note: only used for fuel calculations at the moment)
IDLE_THROTTLE=0.04                              ; %/100 - how much throttle is used to achieve idle (note: only used for fuel calculations at the moment)
IDLE_CUTOFF=1100                                ; rpm at which idle throttle ceases (note: only used for fuel calculations at the moment - suggested to use idle rpm + 100 for most cars - for some race cars, idle throttle never cuts out, so the cutoff should be greater than the rev limit)

[FUEL_CONSUMPTION]    ;ok                          ; new section
THERMAL_EFFICIENCY=0.23 			;need to be higher than reality 
FUEL_LHV=43                                     ; fuel lower heating value - MJ/kg
LOG_FUEL_FLOW=0                                 ; if 1, current flow rate will be logged in custom_shaders_patch.log - WARNING - setting to 1 will generate very large logs; only use for debugging/data validation.

[THROTTLE_RESPONSE]
RPM_REFERENCE=5000
LUT=throttle_max.lut

;from torque throttle switch script
[THROTTLE_LUA]
THROTTLE_GAMMA=1.0 ; Defaults to 1.0 if not specified.
THROTTLE_SLOPE=1.5 ; Defaults to 1.5 if not specified.
IDLE_RPM=900 ; Defaults to 1000 if not specified. - has to be the same as engineIdleRpm in car_parameters.lua!
THROTTLE_TYPE=0 ; 0=Cable Throttle, 1=Drive by Wire. Defaults to 0 if not specified.

[MAP]
DEFAULT=1                        ; default map index is normal
MAP_0=engine_map0_rich.lut       ; Rich - coolant is getting high, you’re stuck in traffic, or in heavy rain / cold where mixture stability matters more than grunt.
MAP_1=engine_map1_normal.lut     ; Normal
MAP_2=engine_map2_lean.lut       ; Lean - Use this map as your economy / cruise setting: noticeably worse shove in the upper band, but worth it on fuel.
;MAP_3=engine_map3_push.lut       ; Push - Disabled for sportscars. Enable on GP cars. Use for the short bursts of maximum power, like for overtakes. Not recommended to use for long periods of time, as it stresses the engine a lot.

[COAST_REF]
RPM=5000						; rev number reference
TORQUE=120						; engine braking torque value in Nm at rev number reference
NON_LINEARITY=0					; coast engine brake from ZERO to TORQUE value at rpm with linear (0) to fully exponential (1)

[COAST_DATA]					; OBSOLETE SECTION. Must copy to keep AC from crashing, but do not use for data
COAST0=0						; OBSOLETE SECTION. Must copy to keep AC from crashing, but do not use for data
COAST1=0						; OBSOLETE SECTION. Must copy to keep AC from crashing, but do not use for data
COAST=0.0000015					; OBSOLETE SECTION. Must copy to keep AC from crashing, but do not use for data

[COAST_CURVE]					; OBSOLETE SECTION. Must copy to keep AC from crashing, but do not use for data
FILENAME=coast.lut				; OBSOLETE SECTION. Must copy to keep AC from crashing, but do not use for data

[DAMAGE]
RPM_THRESHOLD=5600   	   		; RPM at which the engine starts to take damage
RPM_DAMAGE_K=0.1            	; amount of damage per second per (rpm-threshold)
TORQUE_MULTIPLIER_CURVE=(|1=0.4|100=0.5|200=0.6|300=0.8|400=0.9|500=0.98|1000=1.0|)
MALFUNCTION_CHANCE_CURVE=(|1=0.85|200=0.7|600=0.3|650=0.2|750=0.1|1000=0.0|)