[HEADER]
VERSION=4

[_EXTENSION]
ENABLE=1
USE_ADVANCED_SYSTEM=0

[DATA]
MAX_TORQUE=1000				; Maximum Brake torque in Nm
FRONT_SHARE=0.65			; Percentance of brake torque at front axis
HANDBRAKE_TORQUE=400		; Handbrake torque (at the rear wheels)
COCKPIT_ADJUSTABLE=0   		; 0: no bias control from cockpit, 1: bias control from cockpit
ADJUST_STEP=0.5   			; step for bias cockpit adjustment.

[TEMPS_FRONT]
COOL_TRANSFER=0.00010
TORQUE_K=0.22
PERF_CURVE=(|0=0.98|50=1.00|150=1.00|200=0.98|250=0.85|300=0.72|350=0.58|400=0.45|450=0.35|500=0.25|)
COOL_SPEED_FACTOR=0.00036       ; OPEN ducts: stronger airflow effect
COOL_SPEED_FACTOR_0=0.00000015  ; CLOSED ducts: almost no airflow
CORE_TRANSFER_IN=0.000008
CORE_TRANSFER_OUT=0.014         ; surface can pull core heat while moving
CORE_TRANSFER_AIR=0.0000006     ; tiny stationary bleed

[TEMPS_REAR]
COOL_TRANSFER=0.00010
TORQUE_K=0.22
PERF_CURVE=(|0=0.98|50=1.00|150=1.00|200=0.98|250=0.85|300=0.72|350=0.58|400=0.45|450=0.35|500=0.25|)
COOL_SPEED_FACTOR=0.00032
COOL_SPEED_FACTOR_0=0.00000015
CORE_TRANSFER_IN=0.000008
CORE_TRANSFER_OUT=0.013
CORE_TRANSFER_AIR=0.0000006